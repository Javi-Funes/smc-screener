name: SMC Telegram Bot — Polling

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos
  workflow_dispatch:         # manual desde Actions

jobs:
  polling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests yfinance pandas numpy

      - name: Restaurar offset
        uses: actions/cache@v4
        with:
          path: results/telegram_offset.txt
          key: telegram-offset-${{ github.run_id }}
          restore-keys: |
            telegram-offset-

      - name: Restaurar ultimo reporte
        uses: actions/cache@v4
        with:
          path: results/reporte_latest.txt
          key: reporte-latest-${{ github.run_id }}
          restore-keys: |
            reporte-latest-

      - name: Correr bot
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_bot.py

      - name: Guardar offset actualizado
        uses: actions/cache/save@v4
        if: always()
        with:
          path: results/telegram_offset.txt
          key: telegram-offset-${{ github.run_id }}
