name: SMC Telegram Bot — Polling

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos
  workflow_dispatch:         # manual desde Actions

jobs:
  polling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests yfinance pandas numpy

      - name: Descargar offset anterior
        uses: dawidd6/action-download-artifact@v6
        with:
          name: telegram-offset
          path: results/
          if_no_artifact_found: ignore
          workflow_conclusion: success

      - name: Correr bot
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_bot.py

      - name: Guardar offset actualizado
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: telegram-offset
          path: results/telegram_offset.txt
          retention-days: 7
          overwrite: true
