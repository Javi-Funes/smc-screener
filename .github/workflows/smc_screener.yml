name: SMC Discount Zone Screener

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas numpy
      - run: python scripts/smc_screener.py
      - uses: actions/upload-artifact@v4
        with:
          name: smc-discount-results
          path: results/
          retention-days: 30
