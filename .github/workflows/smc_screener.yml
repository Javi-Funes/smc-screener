name: SMC Discount Zone Screener

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install yfinance pandas numpy

      - name: 🔍 Correr SMC Screener
        run: python scripts/smc_screener.py

      - name: 📊 Subir CSV como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: smc-discount-results-${{ github.run_number }}
          path: results/
          retention-days: 30

      - name: 💾 Guardar latest CSV en el repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/smc_discount_latest.csv || true
          git diff --staged --quiet || git commit -m "📊 Update SMC results [$(date '+%Y-%m-%d %H:%M')]"
          git push || true
```

4. Click **Commit new file**

