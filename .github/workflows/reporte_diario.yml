name: SMC Reporte Diario

on:
  schedule:
    - cron: '0 10 * * 1-5'   # 7AM ARG (UTC-3), lunes a viernes
  workflow_dispatch:           # manual desde Actions

permissions:
  contents: write              # necesario para hacer commit

jobs:
  reporte:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install yfinance pandas numpy requests

      - name: Correr screener
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_PAGES_URL:  https://javi-funes.github.io/smc-screener
        run: python scripts/reporte_diario.py

      - name: Commit y push del reporte
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "reporte $(date +'%Y-%m-%d %H:%M') ARG"
          git push
