name: SMC Reporte Diario - Argentina

on:
  schedule:
    # 7:00 AM Argentina (UTC-3) = 10:00 AM UTC
    # Lunes a Viernes
    - cron: '0 10 * * 1-5'
  workflow_dispatch:  # permite correrlo manualmente

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install yfinance pandas numpy requests

      - name: Correr Reporte Diario
        run: python scripts/reporte_diario.py

      - name: Subir reporte como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-diario-${{ github.run_number }}
          path: results/
          retention-days: 30
